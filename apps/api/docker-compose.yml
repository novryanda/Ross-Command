# ============================================================
# Komando Center – Backend API
# Database: PostgreSQL eksternal (Dokploy / managed instance)
# Env vars dikelola via Dokploy panel → injected sebagai ${VAR}.
# ============================================================

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}

      # ── Database ───────────────────────────────────────────
      DATABASE_URL: ${DATABASE_URL}

      # ── Auth (Better Auth) ─────────────────────────────────
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS}
      BETTER_AUTH_SECRETS: ${BETTER_AUTH_SECRETS:-}
      BETTER_AUTH_TRUST_PROXY_HEADERS: ${BETTER_AUTH_TRUST_PROXY_HEADERS:-true}
      BETTER_AUTH_IP_HEADERS: ${BETTER_AUTH_IP_HEADERS:-}

      # ── Email / SMTP ───────────────────────────────────────
      INTERNAL_EMAIL_DOMAIN: ${INTERNAL_EMAIL_DOMAIN}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER}
      EMAIL_FROM: ${EMAIL_FROM}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}

      # ── Startup flags ──────────────────────────────────────
      RUN_MIGRATE_ON_STARTUP: ${RUN_MIGRATE_ON_STARTUP:-true}

      # ── System settings (enkripsi token Apify, dll.) ─────
      SETTINGS_ENCRYPTION_KEY: ${SETTINGS_ENCRYPTION_KEY}

      # ── Apify webhook (URL publik yang bisa diakses dari internet)
      API_PUBLIC_BASE_URL: ${API_PUBLIC_BASE_URL}
    expose:
      - '${PORT:-3001}'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:${PORT:-3001}/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

networks:
  dokploy-network:
    external: true
