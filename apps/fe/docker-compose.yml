services:
  mocci-admin:
    image: ${GHCR_IMAGE:-ghcr.io/fatmuh/mocci-admin}:${GHCR_TAG:-latest}
    pull_policy: always
    container_name: mocci-admin
    ports:
      - "${APP_PORT:-3012}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_AUTH_COOKIE_PREFIX: ${NEXT_PUBLIC_AUTH_COOKIE_PREFIX:-komando}
      NEXT_PUBLIC_ENABLE_QUICK_LOGIN: ${NEXT_PUBLIC_ENABLE_QUICK_LOGIN:-true}
    restart: unless-stopped
